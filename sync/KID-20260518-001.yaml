title: 示例：日本市场付费意愿更多与CV相关
content: |-
  根据历史版本数据和社区反馈分析，日本市场玩家付费意愿与角色CV（声优）的关联度显著高于其他市场。当新角色由高人气CV配音时，日服流水通常出现明显上涨。
